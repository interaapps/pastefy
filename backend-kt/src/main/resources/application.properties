spring.application.name=pastefy-api

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:pastefy}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&cachePrepStmts=${DATABASE_CUSTOMPARAMS_CACHE_PREP_STMTS:true}&prepStmtCacheSize=${DATABASE_CUSTOMPARAMS_PREP_STMT_CACHE_SIZE:250}&prepStmtCacheSqlLimit=${DATABASE_CUSTOMPARAMS_PREP_STMT_CACHE_SQL_LIMIT:2048}&useServerPrepStmts=${DATABASE_CUSTOMPARAMS_USE_SERVER_PREP_STMTS:true}&cacheResultSetMetadata=${DATABASE_CUSTOMPARAMS_CACHE_RESULT_SET_METADATA:true}&cacheServerConfiguration=${DATABASE_CUSTOMPARAMS_CACHE_SERVER_CONFIGURATION:true}&maintainTimeStats=${DATABASE_CUSTOMPARAMS_MAINTAIN_TIME_STATS:true}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USER:pastefy}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:pastefy}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Schema changes are handled externally. The API only verifies the deployed schema.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Liquibase owns the MySQL schema lifecycle. Enable it explicitly during deployment.
spring.liquibase.enabled=${LIQUIBASE_ENABLED:${PASTEFY_AUTOMIGRATE:false}}
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
# Boot Flyway auto-configuration targets the primary datasource. ClickHouse Flyway is configured separately below.
spring.flyway.enabled=false

# Pastefy's public API contract uses snake_case for request and response JSON.
# Springdoc derives /v3/api-docs schemas from the same Jackson naming strategy.
spring.jackson.property-naming-strategy=SNAKE_CASE
server.port=${HTTP_SERVER_PORT:${SERVER_PORT:8080}}
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:NATIVE}

pastefy.cors=${HTTP_SERVER_CORS:}
pastefy.login-required-read=${PASTEFY_LOGIN_REQUIRED_READ:${PASTEFY_LOGIN_REQUIRED:false}}
pastefy.login-required-create=${PASTEFY_LOGIN_REQUIRED_CREATE:${PASTEFY_LOGIN_REQUIRED:false}}
pastefy.public-pastes-enabled=${PASTEFY_PUBLIC_PASTES_ENABLED:${PASTEFY_PUBLIC_PASTES:true}}
pastefy.public-stats=${PASTEFY_PUBLIC_STATS:false}
pastefy.meta-tags-enabled=${PASTEFY_META_TAGS:false}
pastefy.meta-tags-preview-length=${PASTEFY_META_TAGS_PREVIEW_LENGTH:4096}
pastefy.server-name=${SERVER_NAME:http://localhost}
pastefy.list-pastes=${PASTEFY_LIST_PASTES:false}
pastefy.pagination-page-limit=${PASTEFY_PAGINATION_PAGE_LIMIT:50}
pastefy.encryption-default=${PASTEFY_ENCRYPTION_DEFAULT:false}
pastefy.custom-logo=${PASTEFY_CUSTOM_LOGO:${PASTEFY_INFO_CUSTOM_LOGO:}}
pastefy.custom-name=${PASTEFY_CUSTOM_NAME:${PASTEFY_INFO_CUSTOM_NAME:}}
pastefy.custom-footer=${PASTEFY_CUSTOM_FOOTER:${PASTEFY_INFO_CUSTOM_FOOTER:}}
pastefy.custom-header=${PASTEFY_CUSTOM_HEADER:}
pastefy.custom-body=${PASTEFY_CUSTOM_BODY:}
pastefy.grant-access-required=${PASTEFY_GRANT_ACCESS_REQUIRED:false}
pastefy.oauth-state-secret=${PASTEFY_OAUTH_STATE_SECRET:pastefydefaultstatechangeitinfuture}
pastefy.oauth.callback-base-url=${PASTEFY_OAUTH_CALLBACK_BASE_URL:http://localhost:8080}
pastefy.oauth.interaapps.client-id=${OAUTH2_INTERAAPPS_CLIENT_ID:}
pastefy.oauth.interaapps.client-secret=${OAUTH2_INTERAAPPS_CLIENT_SECRET:}
pastefy.oauth.google.client-id=${OAUTH2_GOOGLE_CLIENT_ID:}
pastefy.oauth.google.client-secret=${OAUTH2_GOOGLE_CLIENT_SECRET:}
pastefy.oauth.github.client-id=${OAUTH2_GITHUB_CLIENT_ID:}
pastefy.oauth.github.client-secret=${OAUTH2_GITHUB_CLIENT_SECRET:}
pastefy.oauth.twitch.client-id=${OAUTH2_TWITCH_CLIENT_ID:}
pastefy.oauth.twitch.client-secret=${OAUTH2_TWITCH_CLIENT_SECRET:}
pastefy.oauth.discord.client-id=${OAUTH2_DISCORD_CLIENT_ID:}
pastefy.oauth.discord.client-secret=${OAUTH2_DISCORD_CLIENT_SECRET:}
pastefy.oauth.oidc.client-id=${OAUTH2_OIDC_CLIENT_ID:}
pastefy.oauth.oidc.client-secret=${OAUTH2_OIDC_CLIENT_SECRET:}
pastefy.oauth.oidc.authorization-endpoint=${OAUTH2_OIDC_AUTHORIZATION_ENDPOINT:${OAUTH2_OIDC_AUTH_ENDPOINT:}}
pastefy.oauth.oidc.token-endpoint=${OAUTH2_OIDC_TOKEN_ENDPOINT:}
pastefy.oauth.oidc.user-info-endpoint=${OAUTH2_OIDC_USER_INFO_ENDPOINT:${OAUTH2_OIDC_USERINFO_ENDPOINT:}}
pastefy.rate-limiter.enabled=${PASTEFY_RATE_LIMITER_ENABLED:true}
pastefy.rate-limiter.window-millis=${PASTEFY_RATE_LIMITER_WINDOW_MILLIS:5000}
pastefy.rate-limiter.limit=${PASTEFY_RATE_LIMITER_LIMIT:5}

pastefy.redis.enabled=${PASTEFY_REDIS_ENABLED:false}
pastefy.redis.content-ttl-seconds=${PASTEFY_REDIS_CONTENT_TTL_SECONDS:1800}
pastefy.redis.access-count-ttl-seconds=${PASTEFY_REDIS_ACCESS_COUNT_TTL_SECONDS:1800}
pastefy.redis.metrics-ttl-seconds=${PASTEFY_REDIS_METRICS_TTL_SECONDS:30}
pastefy.redis.cache-after-accesses=${PASTEFY_REDIS_CACHE_AFTER_ACCESSES:10}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.connect-timeout=${REDIS_CONNECT_TIMEOUT:1s}
spring.data.redis.timeout=${REDIS_TIMEOUT:1s}
spring.data.redis.repositories.enabled=false

pastefy.s3.enabled=${PASTEFY_S3_ENABLED:false}
pastefy.s3.endpoint=${MINIO_SERVER:}
pastefy.s3.access-key=${MINIO_ACCESS_KEY:}
pastefy.s3.secret-key=${MINIO_SECRET_KEY:}
pastefy.s3.bucket=${MINIO_BUCKET:pastefy}
pastefy.s3.region=${MINIO_REGION:}
pastefy.s3.paste-size-threshold=${MINIO_PASTESIZE_THRESHOLD:-1}
pastefy.s3.create-bucket=${MINIO_CREATE_BUCKET:false}

pastefy.elasticsearch.enabled=${PASTEFY_ELASTICSEARCH_ENABLED:false}
pastefy.elasticsearch.api-key=${ELASTICSEARCH_API_KEY:}
pastefy.elasticsearch.index-name=${PASTEFY_ELASTICSEARCH_INDEX_NAME:pastefy_pastes_current}
pastefy.elasticsearch.index-prefix=${PASTEFY_ELASTICSEARCH_INDEX_PREFIX:pastefy_pastes}
pastefy.elasticsearch.legacy-index-name=${PASTEFY_ELASTICSEARCH_LEGACY_INDEX_NAME:pastefy_pastes}
pastefy.elasticsearch.number-of-shards=${PASTEFY_ELASTICSEARCH_NUMBER_OF_SHARDS:1}
pastefy.elasticsearch.number-of-replicas=${PASTEFY_ELASTICSEARCH_NUMBER_OF_REPLICAS:1}
# Elasticsearch mappings are migrated at startup unless explicitly disabled.
pastefy.elasticsearch.migrations.enabled=${PASTEFY_ELASTICSEARCH_MIGRATIONS_ENABLED:true}
spring.elasticsearch.uris=${ELASTICSEARCH_URL:http://localhost:9200}
spring.elasticsearch.username=${ELASTICSEARCH_USER:}
spring.elasticsearch.password=${ELASTICSEARCH_PASSWORD:}
spring.elasticsearch.connection-timeout=${ELASTICSEARCH_CONNECTION_TIMEOUT:2s}
spring.elasticsearch.socket-timeout=${ELASTICSEARCH_SOCKET_TIMEOUT:5s}
spring.data.elasticsearch.repositories.enabled=false

pastefy.ai.enabled=${PASTEFY_AI_ENABLED:false}
pastefy.ai.provider=${PASTEFY_AI_PROVIDER:${AI_PROVIDER:}}
pastefy.ai.model=${PASTEFY_AI_MODEL:${AI_MODEL:}}
pastefy.ai.engagement-threshold=${PASTEFY_AI_ENGAGEMENT_THRESHOLD:${AI_ENGAGEMENT_THRESHOLD:100}}
pastefy.ai.jobs.workers=${PASTEFY_AI_JOBS_WORKERS:${AI_JOB_WORKERS:2}}
pastefy.ai.jobs.poll-interval-millis=${PASTEFY_AI_JOBS_POLL_INTERVAL_MILLIS:${AI_JOB_POLL_INTERVAL_MILLIS:5000}}
pastefy.ai.jobs.lease-seconds=${PASTEFY_AI_JOBS_LEASE_SECONDS:${AI_JOB_LEASE_SECONDS:120}}
pastefy.ai.jobs.max-attempts=${PASTEFY_AI_JOBS_MAX_ATTEMPTS:${AI_JOB_MAX_ATTEMPTS:3}}
pastefy.ai.jobs.retry-delay-seconds=${PASTEFY_AI_JOBS_RETRY_DELAY_SECONDS:${AI_JOB_RETRY_DELAY_SECONDS:60}}
pastefy.ai.jobs.sweeper-enabled=${PASTEFY_AI_JOBS_SWEEPER_ENABLED:${AI_JOB_SWEEPER_ENABLED:false}}
pastefy.ai.jobs.sweep-interval-millis=${PASTEFY_AI_JOBS_SWEEP_INTERVAL_MILLIS:${AI_JOB_SWEEP_INTERVAL_MILLIS:300000}}
spring.ai.anthropic.api-key=${AI_ANTHROPIC_TOKEN:}
spring.ai.anthropic.chat.options.model=${AI_ANTHROPIC_MODEL:claude-3-5-haiku-latest}
spring.ai.google.genai.api-key=${AI_GOOGLE_TOKEN:}
spring.ai.google.genai.chat.options.model=${AI_GOOGLE_MODEL:gemini-2.5-flash-lite}
spring.ai.model.chat=${SPRING_AI_MODEL_CHAT:${AI_PROVIDER:none}}

pastefy.analytics.enabled=${PASTEFY_ANALYTICS_ENABLED:false}
pastefy.analytics.jdbc-url=${ANALYTICS_CLICKHOUSE_JDBC_URL:${ANALYTICS_CLICKHOUSE_URL:}}
pastefy.analytics.database=${ANALYTICS_CLICKHOUSE_DATABASE:default}
pastefy.analytics.table=${ANALYTICS_CLICKHOUSE_TABLE:pastefy_analytics_visits}
pastefy.analytics.user=${ANALYTICS_CLICKHOUSE_USER:default}
pastefy.analytics.password=${ANALYTICS_CLICKHOUSE_PASSWORD:}
pastefy.analytics.retention-days=${ANALYTICS_RETENTION_DAYS:90}
pastefy.analytics.batch-size=${ANALYTICS_BATCH_SIZE:1000}
pastefy.analytics.queue-capacity=${ANALYTICS_QUEUE_CAPACITY:100000}
pastefy.analytics.flush-interval-millis=${ANALYTICS_FLUSH_INTERVAL_MILLIS:1000}
pastefy.analytics.http-connect-timeout-millis=${ANALYTICS_HTTP_CONNECT_TIMEOUT_MILLIS:2000}
pastefy.analytics.http-request-timeout-millis=${ANALYTICS_HTTP_REQUEST_TIMEOUT_MILLIS:5000}
pastefy.analytics.ip-hash-salt=${ANALYTICS_IP_HASH_SALT:}
pastefy.analytics.ip-source=${ANALYTICS_IP_SOURCE:direct}
pastefy.analytics.ip-header=${ANALYTICS_IP_HEADER:}
pastefy.analytics.geo-ip-mmdb-path=${ANALYTICS_GEOIP_MMDB_PATH:}
pastefy.analytics.track-bots=${ANALYTICS_TRACK_BOTS:true}
# Flyway owns ClickHouse schema changes. Enable only in the deployment step that applies migrations.
pastefy.analytics.migrations.enabled=${ANALYTICS_CLICKHOUSE_MIGRATIONS_ENABLED:${ANALYTICS_CLICKHOUSE_AUTOMIGRATE:false}}
pastefy.analytics.migrations.repair-failed-history=${ANALYTICS_CLICKHOUSE_REPAIR_FAILED_HISTORY:false}

# Local test fixtures. The seeder is disabled by default and does not run with the prod Spring profile.
pastefy.seeding.enabled=${PASTEFY_SEEDING_ENABLED:false}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.model-converters.pageable-converter.enabled=true
