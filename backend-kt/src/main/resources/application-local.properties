# Local development profile: seed deterministic test data into the configured database.
# The seeder is idempotent and only inserts missing records.
pastefy.seeding.enabled=${PASTEFY_SEEDING_ENABLED:true}
spring.liquibase.enabled=${LIQUIBASE_ENABLED:true}

# Local docker-compose services in backend-kt/docker-compose.yaml.
pastefy.redis.enabled=${PASTEFY_REDIS_ENABLED:true}
pastefy.redis.cache-after-accesses=${PASTEFY_REDIS_CACHE_AFTER_ACCESSES:1}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

pastefy.s3.enabled=${PASTEFY_S3_ENABLED:true}
pastefy.s3.endpoint=${MINIO_SERVER:http://localhost:9000}
pastefy.s3.access-key=${MINIO_ACCESS_KEY:minioadmin}
pastefy.s3.secret-key=${MINIO_SECRET_KEY:minioadmin}
pastefy.s3.bucket=${MINIO_BUCKET:pastefy}
pastefy.s3.region=${MINIO_REGION:us-east-1}
pastefy.s3.paste-size-threshold=${MINIO_PASTESIZE_THRESHOLD:1024}
pastefy.s3.create-bucket=${MINIO_CREATE_BUCKET:true}

pastefy.elasticsearch.enabled=${PASTEFY_ELASTICSEARCH_ENABLED:true}
pastefy.elasticsearch.migrations.enabled=${PASTEFY_ELASTICSEARCH_MIGRATIONS_ENABLED:true}
spring.elasticsearch.uris=${ELASTICSEARCH_URL:http://localhost:9200}
spring.elasticsearch.username=${ELASTICSEARCH_USER:}
spring.elasticsearch.password=${ELASTICSEARCH_PASSWORD:}

pastefy.analytics.enabled=${PASTEFY_ANALYTICS_ENABLED:true}
pastefy.analytics.jdbc-url=${ANALYTICS_CLICKHOUSE_JDBC_URL:jdbc:clickhouse://localhost:8123/pastefy}
pastefy.analytics.database=${ANALYTICS_CLICKHOUSE_DATABASE:pastefy}
pastefy.analytics.table=${ANALYTICS_CLICKHOUSE_TABLE:pastefy_analytics_visits}
pastefy.analytics.user=${ANALYTICS_CLICKHOUSE_USER:pastefy}
pastefy.analytics.password=${ANALYTICS_CLICKHOUSE_PASSWORD:pastefy}
pastefy.analytics.ip-hash-salt=${ANALYTICS_IP_HASH_SALT:local-development-ip-hash-salt}
pastefy.analytics.migrations.enabled=${ANALYTICS_CLICKHOUSE_MIGRATIONS_ENABLED:true}
pastefy.analytics.migrations.repair-failed-history=${ANALYTICS_CLICKHOUSE_REPAIR_FAILED_HISTORY:true}
